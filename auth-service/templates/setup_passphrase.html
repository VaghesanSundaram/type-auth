<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo ID | Set Passphrase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .passphrase-info {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            position: relative;
        }

        .passphrase-info::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            width: 10px;
            height: 10px;
            border-top: 2px solid var(--accent-secondary);
            border-left: 2px solid var(--accent-secondary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .char-count {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-family: var(--font-mono);
        }

        .char-count.valid {
            color: var(--success);
        }

        .char-count.invalid {
            color: var(--error);
        }

        .match-status {
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .match-status.match {
            color: var(--success);
        }

        .match-status.no-match {
            color: var(--error);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-content">
                <div class="header">
                    <h1>Set Your Passphrase</h1>
                    <p class="subtitle">Creating account for <span class="username">{{ username }}</span></p>
                </div>

                <div class="passphrase-info">
                    <strong>Why a long passphrase?</strong><br>
                    Your passphrase is a fallback if biometric authentication fails.
                    A minimum of 20 characters ensures strong security.
                    Consider using a memorable sentence or phrase.
                </div>

                <div class="status hidden" id="status"></div>

                <form id="passphrase-form">
                    <div class="form-group">
                        <label for="passphrase">Passphrase (min 20 characters)</label>
                        <input type="password" id="passphrase" name="passphrase"
                            placeholder="Enter a memorable passphrase..." autocomplete="new-password" required minlength="20">
                        <div class="char-count" id="char-count">0 / 20 characters</div>
                    </div>

                    <div class="form-group">
                        <label for="passphrase-confirm">Confirm Passphrase</label>
                        <input type="password" id="passphrase-confirm" name="passphrase-confirm"
                            placeholder="Re-enter your passphrase..." autocomplete="new-password" required minlength="20">
                        <div class="match-status" id="match-status"></div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submit-btn" disabled>
                        Continue to Enrollment
                    </button>
                </form>

                <div class="fallback-link">
                    <a href="{{ callback }}?status=cancelled">← Cancel and go back</a>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script>
        const CONFIG = {
            userId: "{{ user_id }}",
            username: "{{ username }}",
            callback: "{{ callback }}",
            token: "{{ token }}",
            minLength: 20
        };

        const passphraseInput = document.getElementById('passphrase');
        const confirmInput = document.getElementById('passphrase-confirm');
        const charCount = document.getElementById('char-count');
        const matchStatus = document.getElementById('match-status');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('passphrase-form');
        const statusEl = document.getElementById('status');

        function updateCharCount() {
            const len = passphraseInput.value.length;
            charCount.textContent = `${len} / ${CONFIG.minLength} characters`;
            charCount.className = len >= CONFIG.minLength ? 'char-count valid' : 'char-count invalid';
            validateForm();
        }

        function updateMatchStatus() {
            const pass = passphraseInput.value;
            const conf = confirmInput.value;

            if (conf.length === 0) {
                matchStatus.textContent = '';
                matchStatus.className = 'match-status';
            } else if (pass === conf) {
                matchStatus.textContent = '✓ Passphrases match';
                matchStatus.className = 'match-status match';
            } else {
                matchStatus.textContent = '✗ Passphrases do not match';
                matchStatus.className = 'match-status no-match';
            }
            validateForm();
        }

        function validateForm() {
            const pass = passphraseInput.value;
            const conf = confirmInput.value;
            submitBtn.disabled = !(pass.length >= CONFIG.minLength && pass === conf);
        }

        passphraseInput.addEventListener('input', () => {
            updateCharCount();
            updateMatchStatus();
        });

        confirmInput.addEventListener('input', updateMatchStatus);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const pass = passphraseInput.value;
            const conf = confirmInput.value;

            if (pass !== conf) {
                statusEl.textContent = 'Passphrases do not match.';
                statusEl.className = 'status error';
                return;
            }

            if (pass.length < CONFIG.minLength) {
                statusEl.textContent = `Passphrase must be at least ${CONFIG.minLength} characters.`;
                statusEl.className = 'status error';
                return;
            }

            document.querySelector('.loading-overlay').classList.add('visible');

            try {
                const response = await fetch('/api/user/set-passphrase', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: CONFIG.token,
                        passphrase: pass
                    })
                });

                if (!response.ok) {
                    const text = await response.text();
                    try {
                        const data = JSON.parse(text);
                        throw new Error(data.error || `Server Error (${response.status})`);
                    } catch (e) {
                        if (e.message && e.message !== 'Unexpected token < in JSON at position 0') throw e;
                        throw new Error(`Server Error (${response.status})`);
                    }
                }

                const data = await response.json();

                if (data.success) {
                    window.location.href = `/enroll?token=${CONFIG.token}&callback=${encodeURIComponent(CONFIG.callback)}`;
                } else {
                    document.querySelector('.loading-overlay').classList.remove('visible');
                    statusEl.textContent = data.error || 'Failed to set passphrase.';
                    statusEl.className = 'status error';
                }
            } catch (err) {
                document.querySelector('.loading-overlay').classList.remove('visible');
                statusEl.textContent = (err.message && err.message !== 'Failed to fetch') ? err.message : 'Network error. Please try again.';
                statusEl.className = 'status error';
                console.error(err);
            }
        });

        passphraseInput.focus();
    </script>
</body>

</html>
